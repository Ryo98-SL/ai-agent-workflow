<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Workflow</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the wrong theme.
      // Mirrors ThemeProvider (storage key "aaw-theme", values light|dark|system).
      (function () {
        try {
          var mode = localStorage.getItem("aaw-theme") || "system";
          var dark = mode === "dark" || (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var theme = dark ? "dark" : "light";
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
